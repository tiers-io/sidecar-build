name: Build Sidecars

on:
  workflow_dispatch:
    inputs:
      continuwuity_version:
        description: 'Continuwuity version tag (e.g. v0.5.6)'
        required: true
        default: 'v0.5.6'
      mautrix_slack_version:
        description: 'mautrix-slack version tag (e.g. v0.2603.0)'
        required: true
        default: 'v0.2603.0'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CONTINUWUITY_VERSION: ${{ github.event.inputs.continuwuity_version || 'v0.5.6' }}
  MAUTRIX_SLACK_VERSION: ${{ github.event.inputs.mautrix_slack_version || 'v0.2603.0' }}

jobs:
  build-continuwuity:
    name: Build continuwuity (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            binary_name: conduwuit
            artifact_name: continuwuity-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            runner: macos-14
            binary_name: conduwuit
            artifact_name: continuwuity-x86_64-apple-darwin
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: conduwuit
            artifact_name: continuwuity-x86_64-unknown-linux-gnu
          # Note: Windows is not supported — continuwuity depends on jemalloc
          # which requires a Unix-like build environment
    steps:
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cross && matrix.target || '' }}

      - name: Cache cargo git db
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
          key: cargo-git-${{ matrix.target }}-${{ env.CONTINUWUITY_VERSION }}
          restore-keys: |
            cargo-git-${{ matrix.target }}-

      - name: Build continuwuity from source
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_NET_RETRY: "10"
          GIT_HTTP_LOW_SPEED_LIMIT: "1000"
          GIT_HTTP_LOW_SPEED_TIME: "60"
        run: |
          set -euo pipefail

          # Build args — add --target for cross-compilation
          EXTRA_ARGS=""
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            EXTRA_ARGS="--target ${{ matrix.target }}"
          fi

          # Retry wrapper — forgejo.ellis.link drops connections on large clones
          for attempt in 1 2 3 4 5; do
            echo "=== Attempt $attempt of 5 ==="
            if cargo install \
              --git https://github.com/continuwuity/continuwuity \
              --tag "$CONTINUWUITY_VERSION" \
              --locked \
              --root ./out \
              $EXTRA_ARGS \
              conduwuit 2>&1; then
              echo "Build succeeded on attempt $attempt"
              break
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done

          if [[ ! -f ./out/bin/${{ matrix.binary_name }} ]]; then
            echo "All attempts failed"
            exit 1
          fi

          # Rename to our convention
          mv ./out/bin/${{ matrix.binary_name }} ./${{ matrix.artifact_name }}
          file ./${{ matrix.artifact_name }}

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ./${{ matrix.artifact_name }}
          else
            shasum -a 256 ./${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  download-mautrix-slack:
    name: Download mautrix-slack (${{ matrix.asset }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - asset: mautrix-slack-darwin-arm64
            target: aarch64-apple-darwin
          - asset: mautrix-slack-amd64
            target: x86_64-unknown-linux-gnu
    steps:
      - name: Download and verify
        run: |
          set -euo pipefail

          curl -fsSL -o "${{ matrix.asset }}" \
            "https://github.com/mautrix/slack/releases/download/${{ env.MAUTRIX_SLACK_VERSION }}/${{ matrix.asset }}"
          curl -fsSL -o sha256sums.txt \
            "https://github.com/mautrix/slack/releases/download/${{ env.MAUTRIX_SLACK_VERSION }}/sha256sums.txt"

          expected=$(awk -v f="${{ matrix.asset }}" '$2 == f { print $1 }' sha256sums.txt)
          actual=$(sha256sum "${{ matrix.asset }}" | awk '{ print $1 }')

          if [[ "$expected" != "$actual" ]]; then
            echo "SHA256 mismatch!"
            echo "  expected: $expected"
            echo "  actual:   $actual"
            exit 1
          fi
          echo "SHA256 verified: $expected"

          # Rename to match our convention
          mv "${{ matrix.asset }}" "mautrix-slack-${{ matrix.target }}"
          chmod +x "mautrix-slack-${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mautrix-slack-${{ matrix.target }}
          path: ./mautrix-slack-${{ matrix.target }}

  build-mautrix-slack:
    name: Build mautrix-slack (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-14
            goos: darwin
            goarch: amd64

            artifact_name: mautrix-slack-x86_64-apple-darwin
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            goos: windows
            goarch: amd64

            artifact_name: mautrix-slack-x86_64-pc-windows-msvc.exe
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Clone mautrix-slack
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ env.MAUTRIX_SLACK_VERSION }}" \
            https://github.com/mautrix/slack.git mautrix-slack-src

      - name: Build mautrix-slack
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: mautrix-slack-src
        run: |
          # macOS ARM cross-compiling to x86_64: target the right arch for CGO
          if [[ "$GOOS" == "darwin" && "$GOARCH" == "amd64" ]]; then
            export GOFLAGS="-buildmode=default"
            export CC="clang -arch x86_64"
          fi
          # Use goolm (pure Go) instead of libolm (CGO) — sqlite3 still needs CGO
          go build -tags goolm -trimpath -ldflags="-s -w" -o ../${{ matrix.artifact_name }} ./cmd/mautrix-slack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  release:
    name: Create release
    needs: [build-continuwuity, download-mautrix-slack, build-mautrix-slack]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sidecars-${{ env.CONTINUWUITY_VERSION }}-${{ env.MAUTRIX_SLACK_VERSION }}
          name: "Sidecars: continuwuity ${{ env.CONTINUWUITY_VERSION }} + mautrix-slack ${{ env.MAUTRIX_SLACK_VERSION }}"
          body: |
            Pre-built sidecar binaries for the Messaging desktop app.

            | Binary | Version | Platforms |
            |--------|---------|-----------|
            | continuwuity | ${{ env.CONTINUWUITY_VERSION }} | macOS arm64, macOS Intel, Linux x86_64 |
            | mautrix-slack | ${{ env.MAUTRIX_SLACK_VERSION }} | macOS arm64, macOS Intel, Linux x86_64, Windows x86_64 |

            ## Checksums
            See `sha256sums.txt` attached to this release.
          files: artifacts/*
          fail_on_unmatched_files: true
