name: Build Sidecars

on:
  workflow_dispatch:
    inputs:
      continuwuity_version:
        description: 'Continuwuity version tag (e.g. v0.5.6)'
        required: true
        default: 'v0.5.6'
      mautrix_slack_version:
        description: 'mautrix-slack tag on the fork (e.g. v0.2604.0-tiers.1)'
        required: true
        default: 'v0.2604.0-tiers.1'
      mautrix_slack_repo:
        description: 'mautrix-slack git source (owner/name). Fork carries our extract_js fix.'
        required: true
        default: 'tiers-io/mautrix-slack'
      ollama_version:
        description: 'Ollama version tag (e.g. v0.21.2)'
        required: true
        default: 'v0.21.2'
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CONTINUWUITY_VERSION: ${{ github.event.inputs.continuwuity_version || 'v0.5.6' }}
  MAUTRIX_SLACK_VERSION: ${{ github.event.inputs.mautrix_slack_version || 'v0.2604.0-tiers.1' }}
  MAUTRIX_SLACK_REPO: ${{ github.event.inputs.mautrix_slack_repo || 'tiers-io/mautrix-slack' }}
  OLLAMA_VERSION: ${{ github.event.inputs.ollama_version || 'v0.21.2' }}

jobs:
  build-continuwuity:
    name: Build continuwuity (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            binary_name: conduwuit
            artifact_name: continuwuity-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            runner: macos-14
            binary_name: conduwuit
            artifact_name: continuwuity-x86_64-apple-darwin
            cross: true
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            binary_name: conduwuit
            artifact_name: continuwuity-x86_64-unknown-linux-gnu
          # Note: Windows is not supported — continuwuity depends on jemalloc
          # which requires a Unix-like build environment
    steps:
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libsqlite3-dev liburing-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.cross && matrix.target || '' }}

      - name: Cache cargo git db
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/git/db
            ~/.cargo/registry/cache
          key: cargo-git-${{ matrix.target }}-${{ env.CONTINUWUITY_VERSION }}
          restore-keys: |
            cargo-git-${{ matrix.target }}-

      - name: Build continuwuity from source
        shell: bash
        env:
          CARGO_NET_GIT_FETCH_WITH_CLI: "true"
          CARGO_NET_RETRY: "10"
          GIT_HTTP_LOW_SPEED_LIMIT: "1000"
          GIT_HTTP_LOW_SPEED_TIME: "60"
        run: |
          set -euo pipefail

          # Build args — add --target for cross-compilation
          EXTRA_ARGS=""
          if [[ "${{ matrix.cross }}" == "true" ]]; then
            EXTRA_ARGS="--target ${{ matrix.target }}"
          fi

          # Retry wrapper — forgejo.ellis.link drops connections on large clones
          for attempt in 1 2 3 4 5; do
            echo "=== Attempt $attempt of 5 ==="
            if cargo install \
              --git https://github.com/continuwuity/continuwuity \
              --tag "$CONTINUWUITY_VERSION" \
              --locked \
              --root ./out \
              $EXTRA_ARGS \
              conduwuit 2>&1; then
              echo "Build succeeded on attempt $attempt"
              break
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done

          if [[ ! -f ./out/bin/${{ matrix.binary_name }} ]]; then
            echo "All attempts failed"
            exit 1
          fi

          # Rename to our convention
          mv ./out/bin/${{ matrix.binary_name }} ./${{ matrix.artifact_name }}
          file ./${{ matrix.artifact_name }}

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum ./${{ matrix.artifact_name }}
          else
            shasum -a 256 ./${{ matrix.artifact_name }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  build-mautrix-slack:
    name: Build mautrix-slack (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact_name: mautrix-slack-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            runner: macos-14
            goos: darwin
            goarch: amd64
            artifact_name: mautrix-slack-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact_name: mautrix-slack-x86_64-unknown-linux-gnu
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            goos: windows
            goarch: amd64
            artifact_name: mautrix-slack-x86_64-pc-windows-msvc.exe
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'

      - name: Clone mautrix-slack (fork carries our extract_js fix)
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ env.MAUTRIX_SLACK_VERSION }}" \
            "https://github.com/${{ env.MAUTRIX_SLACK_REPO }}.git" mautrix-slack-src

      - name: Build mautrix-slack
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        working-directory: mautrix-slack-src
        run: |
          # macOS ARM cross-compiling to x86_64: target the right arch for CGO
          if [[ "$GOOS" == "darwin" && "$GOARCH" == "amd64" ]]; then
            export GOFLAGS="-buildmode=default"
            export CC="clang -arch x86_64"
          fi
          # Use goolm (pure Go) instead of libolm (CGO) — sqlite3 still needs CGO
          go build -tags goolm -trimpath -ldflags="-s -w" -o ../${{ matrix.artifact_name }} ./cmd/mautrix-slack

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  build-ollama:
    name: Build ollama (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            goos: darwin
            goarch: arm64
            artifact_name: ollama-aarch64-apple-darwin
          # macOS Intel, Linux x86_64, Windows x86_64 deferred for v1.
          # On darwin/arm64 the Metal GGML backend is statically linked into
          # the binary via Go build tags (ml/backend/ggml/ggml/src/ggml_darwin_arm64.go
          # blank-imports ggml-metal with -DGGML_METAL_EMBED_LIBRARY). Other
          # platforms ship the GGML backends as loose shared libs that
          # ollama dlopens at runtime — bundling those requires a different
          # approach and is out of scope for the v1 single-binary cut.
    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Clone Ollama at pinned tag
        shell: bash
        run: |
          git clone --depth 1 --branch "${{ env.OLLAMA_VERSION }}" \
            https://github.com/ollama/ollama.git ollama-src

      - name: Build ollama
        shell: bash
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          # Match Ollama's official darwin release flags so the binary runs
          # on macOS 14+ and matches their optimization level.
          CGO_CFLAGS: '-O3 -mmacosx-version-min=14.0'
          CGO_CXXFLAGS: '-O3 -mmacosx-version-min=14.0'
          CGO_LDFLAGS: '-mmacosx-version-min=14.0'
        working-directory: ollama-src
        run: |
          set -euo pipefail
          GOFLAGS="-trimpath" go build \
            -ldflags="-s -w -X=github.com/ollama/ollama/version.Version=${OLLAMA_VERSION#v} -X=github.com/ollama/ollama/server.mode=release" \
            -o "../${{ matrix.artifact_name }}" .

      - name: Inspect binary
        shell: bash
        run: |
          set -euo pipefail
          file "./${{ matrix.artifact_name }}"
          if command -v otool >/dev/null 2>&1; then
            echo "--- otool -L ---"
            otool -L "./${{ matrix.artifact_name }}"
          fi
          ls -lh "./${{ matrix.artifact_name }}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "./${{ matrix.artifact_name }}"
          else
            sha256sum "./${{ matrix.artifact_name }}"
          fi

      - name: Smoke test (start, /api/tags, stop)
        if: matrix.goos == 'darwin' && matrix.goarch == 'arm64'
        shell: bash
        run: |
          set -euo pipefail
          chmod +x "./${{ matrix.artifact_name }}"
          # Use isolated model store + non-default port so we don't collide
          # with anything on the runner.
          export OLLAMA_HOST=127.0.0.1:11436
          export OLLAMA_MODELS="$RUNNER_TEMP/ollama-models"
          mkdir -p "$OLLAMA_MODELS"
          "./${{ matrix.artifact_name }}" serve > ollama-serve.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID 2>/dev/null || true' EXIT
          # Poll for readiness up to ~10s
          for i in $(seq 1 40); do
            if curl -fsS "http://${OLLAMA_HOST}/api/tags" >/dev/null 2>&1; then
              echo "Ready after ${i} polls (~$((i * 250))ms)"
              break
            fi
            sleep 0.25
          done
          echo "--- /api/tags ---"
          curl -fsS "http://${OLLAMA_HOST}/api/tags"
          echo
          echo "--- /api/version ---"
          curl -fsS "http://${OLLAMA_HOST}/api/version" || true
          echo
          echo "--- server log tail ---"
          tail -50 ollama-serve.log || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ./${{ matrix.artifact_name }}

  release:
    name: Create release
    needs: [build-continuwuity, build-mautrix-slack, build-ollama]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sidecars-${{ env.CONTINUWUITY_VERSION }}-${{ env.MAUTRIX_SLACK_VERSION }}-ollama-${{ env.OLLAMA_VERSION }}
          name: "Sidecars: continuwuity ${{ env.CONTINUWUITY_VERSION }} + mautrix-slack ${{ env.MAUTRIX_SLACK_VERSION }} + ollama ${{ env.OLLAMA_VERSION }}"
          body: |
            Pre-built sidecar binaries for the Messaging desktop app.

            | Binary | Version | Source | Platforms |
            |--------|---------|--------|-----------|
            | continuwuity | ${{ env.CONTINUWUITY_VERSION }} | continuwuity/continuwuity | macOS arm64, macOS Intel, Linux x86_64 |
            | mautrix-slack | ${{ env.MAUTRIX_SLACK_VERSION }} | ${{ env.MAUTRIX_SLACK_REPO }} | macOS arm64, macOS Intel, Linux x86_64, Windows x86_64 |
            | ollama | ${{ env.OLLAMA_VERSION }} | ollama/ollama | macOS arm64 |

            All mautrix-slack targets are built from source on each run. The
            default source is the `tiers-io/mautrix-slack` fork, which carries
            a patch to pick the Slack team matching the current webview URL
            instead of `teams[0]` — see upstream bug in `ExtractSlackTokenJS`.

            Ollama is built from upstream `ollama/ollama` at the pinned tag.
            On macOS arm64 the Metal GGML backend is statically linked into
            the binary via the `ggml_darwin_arm64.go` build tag (with
            `-DGGML_METAL_EMBED_LIBRARY`), so a single signable binary ships
            with embedded Metal compute kernels — no loose dylibs alongside.
            Other platforms are not built for v1: their GGML backends ship as
            shared libraries that ollama dlopens at runtime, which doesn't
            match the single-binary sidecar shape and is deferred.

            ## Checksums
            See `sha256sums.txt` attached to this release.
          files: artifacts/*
          fail_on_unmatched_files: true
